<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="style.css">

  <title>Frontend Mentor | NFT preview card component</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 0.6875rem; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body>

  <main class="main_container">

    <div class="main_image">
      <img class="main_image" src="images/image-equilibrium.jpg" alt="Glowy and glassy cube in dark blue and pink, floating on a dark blue surface">
    </div>

    <div class="content_container">
      <h2 class="title"> Equilibrium #3429</h2>
      <p class="definition">Our Equilibrium collection promotes balance and calm.</p>
     <div class="mini_container">
        <div class="ethereum_container">
          <img class="eth_icon" src="images/icon-ethereum.svg" alt="">
          <span class="eth_value">0.041 ETH</span>
        </div>
        <div class="clock_container">
          <img  class="clock_icon" src="images/icon-clock.svg" alt="">
          <span class="deadline">3 days left</span>
        </div>
    </div>

    <hr class="separator">

    <div class="creator">
      <img class="creator_avatar" src="images/image-avatar.png" alt="">
      <p class="creation_of">Creation of <span class="creator_name">Jules Wyvern</span></p>
    </div>
    
  </main>

  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">Belhadj Meriem</a>.
  </footer>
</body>
</html>
